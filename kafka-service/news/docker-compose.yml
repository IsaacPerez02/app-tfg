services:

  kafka:
    image: apache/kafka:3.7.0
    container_name: news-kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "news-cluster-001"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - kafka-net

  kafka-init:
    image: apache/kafka:3.7.0
    container_name: news-kafka-init
    depends_on:
      - kafka
    command: >
      /bin/sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic raw_news --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic enriched_news --partitions 3 --replication-factor 1 &&
        echo 'Topics ready'
      "
    restart: "no"
    networks:
      - kafka-net

  producer:
    build:
      context: ./api
    container_name: news-producer
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
    command: ["python", "ingestion/producer_gdelt.py"]
    restart: "no"
    networks:
      - kafka-net

  enricher:
    build:
      context: ./api
    container_name: news-enricher
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
    command: ["python", "processing/consumer_enricher.py"]
    restart: unless-stopped
    networks:
      - kafka-net

  api:
    build:
      context: ./api
    container_name: news-api
    ports:
      - "8002:8002"
    depends_on:
      - kafka-init
    environment:
      KAFKA_BROKER: kafka:29092
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002"]
    restart: unless-stopped
    networks:
      - kafka-net

volumes:
  kafka_data:

networks:
  kafka-net:
    external: true
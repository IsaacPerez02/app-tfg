services:

  # ── Kafka (KRaft, no ZooKeeper) ────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: news-kafka
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_MS: 86400000     # 24 h
      KAFKA_LOG_RETENTION_BYTES: 524288000 # 500 MB
      CLUSTER_ID: "news-cluster-001"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ── Create topics ──────────────────────────────────────────────────────────
  kafka-init:
    image: apache/kafka:3.7.0
    container_name: news-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/sh -c "
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic raw_news --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic enriched_news --partitions 3 --replication-factor 1 &&
        echo 'Topics ready'
      "
    restart: "no"

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: news-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-password123}
    ports:
      - "27018:27017"   # host:27018 → avoids clash with prices service on 27017
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── GDELT producer (runs once, then exits) ─────────────────────────────────
  producer:
    build:
      context: ./api
    container_name: news-producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:29092
    command: ["python", "ingestion/producer_gdelt.py"]
    restart: "no"

  # ── newspaper3k enricher ───────────────────────────────────────────────────
  enricher:
    build:
      context: ./api
    container_name: news-enricher
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKER: kafka:29092
    command: ["python", "processing/consumer_enricher.py"]
    restart: unless-stopped

  # ── MongoDB sink (enriched_news → MongoDB) ─────────────────────────────────
  mongo-sink:
    build:
      context: ./api
    container_name: news-mongo-sink
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASS:-password123}@mongodb:27017
      MONGO_DB: news
    command: ["python", "processing/consumer_mongo.py"]
    restart: unless-stopped

  # ── FastAPI feed ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
    container_name: news-api
    ports:
      - "8002:8002"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BROKER: kafka:29092
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASS:-password123}@mongodb:27017
      MONGO_DB: news
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8002"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  kafka_data:
  mongodb_data:
